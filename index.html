    <script>
    // Existing Copy IP function
    function copyIP(ip) {
        if (navigator.clipboard && window.isSecureContext) {
            navigator.clipboard.writeText(ip).then(showToast);
        } else {
            const textArea = document.createElement("textarea");
            textArea.value = ip;
            textArea.style.position = "fixed";
            textArea.style.left = "-999999px";
            textArea.style.top = "-999999px";
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            try {
                document.execCommand('copy');
                showToast();
            } catch (err) {
                console.error('Fallback copy failed', err);
            }
            document.body.removeChild(textArea);
        }
    }

    function showToast() {
        const toast = document.getElementById('copyToast');
        toast.classList.remove('hidden', 'toast');
        void toast.offsetWidth; 
        toast.classList.add('toast');
        setTimeout(() => {
            toast.classList.add('hidden');
            toast.classList.remove('toast');
        }, 2500);
    }

    // Existing Minecraft Status function (with your specific playit address)
    async function fetchServerStatus() {
        const badge = document.getElementById('status-badge');
        const text = document.getElementById('status-text');
        const dot = document.getElementById('status-dot');
        const ping = document.getElementById('status-ping');
        const playerList = document.getElementById('player-list');

        try {
            const response = await fetch('https://api.mcsrvstat.us/3/analysis-showing.gl.joinmc.link?t=' + new Date().getTime());
            const data = await response.json();

            if (badge) badge.classList.remove('opacity-0', 'translate-y-2');

            if (data.online) {
                dot.classList.replace('bg-slate-500', 'bg-emerald-400');
                if (ping) {
                    ping.classList.remove('hidden');
                    ping.classList.replace('bg-slate-400', 'bg-emerald-400');
                }
                const pOnline = data.players.online;
                const pMax = data.players.max;
                text.innerHTML = 'Server Online <span class="mx-2 opacity-30">|</span> <span class="font-bold text-white">' + pOnline + '</span> <span class="text-pink-100/70">/ ' + pMax + ' Players</span>';
                
                // Display player names
                if (playerList && data.players.list && data.players.list.length > 0) {
                    const names = data.players.list.map(function(player) {
                        return '<span class="bg-rose-950/60 px-3 py-1 rounded-full text-xs text-pink-100 border border-pink-200/20">' + player.name + '</span>';
                    });
                    playerList.innerHTML = names.join('');
                } else if (playerList) {
                    playerList.innerHTML = '';
                }
            } else {
                dot.classList.replace('bg-slate-500', 'bg-red-400');
                if (ping) ping.classList.add('hidden');
                text.innerText = "Server Currently Offline";
                if (playerList) playerList.innerHTML = '';
            }
        } catch (error) {
            console.error("Status fetch failed", error);
        }
    }

    // NEW: Twitch Live Status function
    async function checkTwitchStatus() {
    const dot = document.getElementById('twitch-dot');
    const pulse = document.getElementById('twitch-pulse');
    
    if (!dot || !pulse) return;

    try {
        const response = await fetch('https://decapi.me/twitch/uptime/lauram31_');
        const data = await response.text();

        if (data && !data.toLowerCase().includes("offline")) {
            // --- LIVE STATE ---
            dot.classList.remove('bg-rose-500'); // Remove Red
            dot.classList.add('bg-emerald-400');    // Add Green
            pulse.classList.remove('hidden');    // START THE PULSE
        } else {
            // --- OFFLINE STATE ---
            dot.classList.remove('bg-emerald-400'); // Remove Green
            dot.classList.add('bg-rose-500');    // Add Red
            pulse.classList.add('hidden');       // STOP THE PULSE
        }
    } catch (error) {
        console.error("Twitch check failed", error);
    }
}

    // Initial Load: Run both functions when page opens
    window.addEventListener('load', () => {
        fetchServerStatus();
        checkTwitchStatus();
    });

    // Refresh Loop: Update both every 30 seconds
    setInterval(() => {
        fetchServerStatus();
        checkTwitchStatus();
    }, 60000);

    // Minecraft Block Explosion Effect
    function createExplosion(event) {
        // Minecraft block colors (dirt, stone, wood, etc.)
        const blockColors = [
            '#8B4513', // Dirt brown
            '#808080', // Stone gray
            '#A0522D', // Wood brown
            '#4A7C3F', // Grass green
            '#7C7C7C', // Cobblestone
            '#B5651D', // Oak wood
            '#5D4E37', // Dirt
        ];

        const x = event.clientX;
        const y = event.clientY;
        const particleCount = 12;

        for (let i = 0; i < particleCount; i++) {
            const particle = document.createElement('div');
            particle.classList.add('explosion-particle');
            
            // Random direction and distance
            const angle = (Math.PI * 2 * i) / particleCount + (Math.random() - 0.5);
            const distance = 30 + Math.random() * 50;
            const tx = Math.cos(angle) * distance;
            const ty = Math.sin(angle) * distance;
            
            // Random block color
            const color = blockColors[Math.floor(Math.random() * blockColors.length)];
            
            particle.style.left = (x - 4) + 'px';
            particle.style.top = (y - 4) + 'px';
            particle.style.backgroundColor = color;
            
            document.body.appendChild(particle);
            
            // Animate using setInterval for broader compatibility
            const startTime = Date.now();
            const duration = 600;
            
            const animate = function() {
                const elapsed = Date.now() - startTime;
                const progress = elapsed / duration;
                
                if (progress < 1) {
                    const currentX = tx * progress;
                    const currentY = ty * progress;
                    const scale = 1 - (0.7 * progress);
                    const opacity = 1 - progress;
                    
                    particle.style.transform = 'translate(' + currentX + 'px, ' + currentY + 'px) scale(' + scale + ')';
                    particle.style.opacity = opacity;
                    
                    requestAnimationFrame(animate);
                } else {
                    particle.remove();
                }
            };
            
            requestAnimationFrame(animate);
        }
    }

    // Minecraft Diamond Rain Effect
    (function() {
        var canvas = document.getElementById('diamondRain');
        if (!canvas) return;
        
        var ctx = canvas.getContext('2d');
        var width = canvas.offsetWidth || 300;
        var height = 150;
        canvas.width = width;
        canvas.height = height;
        
        var diamonds = [];
        var diamondColors = ['#3AE6FA', '#2BC4D4', '#5DF1FF', '#1DB9CC'];
        
        function createDiamond() {
            return {
                x: Math.random() * width,
                y: -10,
                size: 3 + Math.random() * 4,
                speed: 1 + Math.random() * 2,
                color: diamondColors[Math.floor(Math.random() * diamondColors.length)],
                rotation: Math.random() * Math.PI * 2,
                rotSpeed: (Math.random() - 0.5) * 0.1
            };
        }
        
        function drawDiamond(d) {
            ctx.save();
            ctx.translate(d.x, d.y);
            ctx.rotate(d.rotation);
            ctx.fillStyle = d.color;
            ctx.beginPath();
            ctx.moveTo(0, -d.size);
            ctx.lineTo(d.size * 0.5, 0);
            ctx.lineTo(0, d.size);
            ctx.lineTo(-d.size * 0.5, 0);
            ctx.closePath();
            ctx.fill();
            ctx.restore();
        }
        
        function animate() {
            ctx.clearRect(0, 0, width, height);
            
            // Add new diamonds occasionally
            if (Math.random() < 0.05) {
                diamonds.push(createDiamond());
            }
            
            // Update and draw diamonds
            for (var i = diamonds.length - 1; i >= 0; i--) {
                var d = diamonds[i];
                d.y += d.speed;
                d.rotation += d.rotSpeed;
                
                drawDiamond(d);
                
                // Remove diamonds that have fallen off screen
                if (d.y > height + 10) {
                    diamonds.splice(i, 1);
                }
            }
            
            requestAnimationFrame(animate);
        }
        
        // Start animation when page loads
        window.addEventListener('load', function() {
            width = canvas.offsetWidth || canvas.parentElement.offsetWidth || 300;
            canvas.width = width;
            animate();
        });
        
        // Handle resize
        window.addEventListener('resize', function() {
            width = canvas.offsetWidth || canvas.parentElement.offsetWidth || 300;
            canvas.width = width;
        });
    })();
</script>
